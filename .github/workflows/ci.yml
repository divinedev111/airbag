name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install SQLite deps
        run: sudo apt-get update && sudo apt-get install -y gcc
      - run: CGO_ENABLED=1 go test ./...
      - run: go vet ./...
